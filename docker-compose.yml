services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: finch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finch
      POSTGRES_PASSWORD: finch_secret
      POSTGRES_DB: finch_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finch -d finch_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: finch-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: finch-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://finch:finch_secret@postgres:5432/finch_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # For development with hot reload, mount source but NOT node_modules
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/prisma:/app/prisma:ro
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run start:dev"

  # Background Worker (for BullMQ jobs)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: finch-worker
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://finch:finch_secret@postgres:5432/finch_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      WORKER_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:worker

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: finch-network
